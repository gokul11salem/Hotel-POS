<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Murugan's Tea Stall — Billing</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rozha+One&family=Work+Sans:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg-deep:#181009;
  --bg-panel:#221709;
  --bg-elevated:#2c1e10;
  --bg-elevated-2:#38270f;
  --accent-orange:#ff7a29;
  --accent-orange-dim:#c9541a;
  --accent-gold:#e8b94d;
  --text-primary:#f6ede0;
  --text-muted:#b6a58c;
  --text-faint:#8a7a63;
  --border-soft:rgba(232,185,77,0.16);
  --border-strong:rgba(232,185,77,0.32);
  --success:#6fbf73;
  --danger:#e8604a;
  --radius:14px;
  --radius-sm:9px;
  --font-display:'Rozha One',serif;
  --font-body:'Work Sans',sans-serif;
  --font-mono:'IBM Plex Mono',monospace;
  --shadow-glow:0 0 0 1px var(--border-soft), 0 8px 24px -8px rgba(0,0,0,0.5);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:
    radial-gradient(1200px 600px at 10% -10%, rgba(255,122,41,0.10), transparent 60%),
    radial-gradient(900px 500px at 100% 0%, rgba(232,185,77,0.08), transparent 55%),
    var(--bg-deep);
  color:var(--text-primary);
  font-family:var(--font-body);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
::selection{background:var(--accent-orange);color:#1a1006;}
button{font-family:inherit;cursor:pointer;}
input,select,textarea{font-family:inherit;}
a{color:inherit;}
::-webkit-scrollbar{width:10px;height:10px;}
::-webkit-scrollbar-thumb{background:var(--bg-elevated-2);border-radius:8px;}
::-webkit-scrollbar-track{background:transparent;}

.loader{display:flex;align-items:center;justify-content:center;height:100vh;color:var(--text-muted);font-family:var(--font-mono);letter-spacing:.05em;}

/* ---------- Header ---------- */
.topbar{
  position:sticky;top:0;z-index:40;
  background:rgba(24,16,9,0.86);
  backdrop-filter:blur(10px);
  border-bottom:1px solid var(--border-soft);
}
.topbar-inner{
  max-width:1180px;margin:0 auto;padding:14px 20px;
  display:flex;align-items:center;gap:14px;
}
.brand{display:flex;align-items:center;gap:12px;flex:1;min-width:0;cursor:pointer;}
.brand-mark{position:relative;width:42px;height:42px;flex:0 0 auto;}
.brand-mark svg{width:100%;height:100%;display:block;}
.steam path{transform-origin:bottom center;opacity:0;animation:rise 3.2s ease-in-out infinite;}
.steam path:nth-child(2){animation-delay:1.05s;}
.steam path:nth-child(3){animation-delay:2.1s;}
@keyframes rise{
  0%{opacity:0;transform:translateY(0) scaleX(1);}
  22%{opacity:.7;}
  78%{opacity:0;}
  100%{opacity:0;transform:translateY(-11px) scaleX(1.35);}
}
.brand-logo-img{width:100%;height:100%;object-fit:cover;border-radius:50%;border:1px solid var(--border-strong);}
.brand-text{min-width:0;}
.brand-name{
  font-family:var(--font-display);font-size:22px;line-height:1.1;
  color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  letter-spacing:.01em;
}
.brand-slogan{font-size:11.5px;color:var(--text-faint);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}
.cart-fab{
  position:relative;background:linear-gradient(160deg,var(--accent-orange),var(--accent-orange-dim));
  border:none;color:#20120a;border-radius:999px;padding:10px 16px;font-weight:700;font-size:13.5px;
  display:flex;align-items:center;gap:8px;transition:transform .15s ease, box-shadow .15s ease;
  box-shadow:0 4px 14px -4px rgba(255,122,41,0.55);
}
.cart-fab:hover{transform:translateY(-2px);box-shadow:0 8px 20px -6px rgba(255,122,41,0.7);}
.cart-badge{
  background:#20120a;color:var(--accent-gold);border-radius:999px;font-size:11px;font-weight:800;
  min-width:18px;height:18px;display:inline-flex;align-items:center;justify-content:center;padding:0 5px;
}

/* ---------- Nav tabs ---------- */
.tabbar{max-width:1180px;margin:0 auto;padding:0 20px;display:flex;gap:4px;overflow-x:auto;}
.tabbtn{
  background:none;border:none;color:var(--text-muted);padding:12px 14px;font-size:13.5px;font-weight:600;
  border-bottom:2px solid transparent;white-space:nowrap;transition:color .15s ease, border-color .15s ease;
  display:flex;align-items:center;gap:7px;
}
.tabbtn:hover{color:var(--text-primary);}
.tabbtn.active{color:var(--accent-gold);border-bottom-color:var(--accent-orange);}

.container{max-width:1180px;margin:0 auto;padding:24px 20px 100px;}
.view{animation:fadeUp .28s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

h2.section-title{font-family:var(--font-display);font-size:26px;font-weight:400;margin:0 0 4px;color:var(--text-primary);}
p.section-sub{color:var(--text-faint);font-size:13px;margin:0 0 20px;}

/* ---------- Cards / grid ---------- */
.card{
  background:var(--bg-panel);border:1px solid var(--border-soft);border-radius:var(--radius);
  padding:18px;transition:border-color .15s ease, transform .15s ease;
}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:26px;}
.stat-card{position:relative;overflow:hidden;}
.stat-card::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,122,41,0.06),transparent 60%);pointer-events:none;}
.stat-label{font-size:11.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--text-faint);margin-bottom:8px;}
.stat-value{font-family:var(--font-mono);font-size:24px;font-weight:600;color:var(--accent-gold);}
.stat-sub{font-size:11.5px;color:var(--text-muted);margin-top:4px;}

.recent-card{margin-bottom:18px;}
.recent-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px dashed var(--border-soft);font-size:13px;}
.recent-row:last-child{border-bottom:none;}
.recent-meta{color:var(--text-faint);font-size:11.5px;}
.recent-amt{font-family:var(--font-mono);color:var(--accent-gold);font-weight:600;}

/* category */
.cat-block{margin-bottom:26px;}
.cat-title{font-size:13px;text-transform:uppercase;letter-spacing:.09em;color:var(--accent-gold);margin:0 0 12px;font-weight:700;}
.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:14px;}
.product-card{
  background:var(--bg-panel);border:1px solid var(--border-soft);border-radius:var(--radius);
  padding:14px;display:flex;flex-direction:column;align-items:center;text-align:center;gap:8px;
  transition:transform .16s ease, box-shadow .16s ease, border-color .16s ease;
}
.product-card:hover{transform:translateY(-4px);border-color:var(--border-strong);box-shadow:0 10px 26px -10px rgba(255,122,41,0.35);}
.product-photo{width:56px;height:56px;border-radius:50%;background:var(--bg-elevated);display:flex;align-items:center;justify-content:center;font-size:28px;overflow:hidden;border:1px solid var(--border-soft);}
.product-photo img{width:100%;height:100%;object-fit:cover;}
.product-name{font-size:13.5px;font-weight:600;line-height:1.25;}
.product-price{font-family:var(--font-mono);color:var(--accent-gold);font-size:13px;}
.add-btn{
  width:100%;background:var(--bg-elevated);border:1px solid var(--border-soft);color:var(--text-primary);
  border-radius:999px;padding:7px 0;font-size:12.5px;font-weight:700;transition:background .15s ease, border-color .15s ease, transform .1s ease;
}
.add-btn:hover{background:var(--accent-orange);border-color:var(--accent-orange);color:#20120a;}
.add-btn:active{transform:scale(.96);}

/* buttons */
.btn{border-radius:999px;padding:11px 20px;font-weight:700;font-size:13.5px;border:1px solid transparent;transition:transform .15s ease, box-shadow .15s ease, opacity .15s ease;}
.btn-primary{background:linear-gradient(160deg,var(--accent-orange),var(--accent-orange-dim));color:#20120a;box-shadow:0 4px 14px -4px rgba(255,122,41,0.5);}
.btn-primary:hover{transform:translateY(-2px);}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-ghost{background:transparent;border-color:var(--border-strong);color:var(--text-primary);}
.btn-ghost:hover{border-color:var(--accent-gold);color:var(--accent-gold);}
.btn-danger{background:transparent;border-color:rgba(232,96,74,0.4);color:var(--danger);}
.btn-danger:hover{background:rgba(232,96,74,0.12);}
.btn-sm{padding:7px 13px;font-size:12px;}
.btn-block{width:100%;}

/* Cart drawer */
.overlay-bg{position:fixed;inset:0;background:rgba(10,6,3,0.55);backdrop-filter:blur(2px);z-index:60;animation:fadeIn .2s ease;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.cart-drawer{
  position:fixed;top:0;right:0;height:100%;width:380px;max-width:92vw;background:var(--bg-panel);
  border-left:1px solid var(--border-strong);z-index:61;display:flex;flex-direction:column;
  animation:slideIn .25s ease;box-shadow:-16px 0 40px rgba(0,0,0,0.4);
}
@keyframes slideIn{from{transform:translateX(100%);}to{transform:translateX(0);}}
.cart-head{padding:18px;border-bottom:1px solid var(--border-soft);display:flex;justify-content:space-between;align-items:center;}
.cart-head h3{font-family:var(--font-display);font-weight:400;font-size:20px;margin:0;}
.close-x{background:none;border:none;color:var(--text-muted);font-size:20px;line-height:1;padding:4px;}
.close-x:hover{color:var(--accent-orange);}
.cart-items{flex:1;overflow-y:auto;padding:12px 18px;}
.cart-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px dashed var(--border-soft);}
.cart-item-emoji{font-size:20px;width:32px;text-align:center;}
.cart-item-info{flex:1;min-width:0;}
.cart-item-name{font-size:13px;font-weight:600;}
.cart-item-price{font-family:var(--font-mono);font-size:11.5px;color:var(--text-faint);}
.qty-ctrl{display:flex;align-items:center;gap:6px;}
.qty-btn{width:24px;height:24px;border-radius:50%;border:1px solid var(--border-soft);background:var(--bg-elevated);color:var(--text-primary);font-size:14px;display:flex;align-items:center;justify-content:center;line-height:1;}
.qty-btn:hover{border-color:var(--accent-gold);color:var(--accent-gold);}
.qty-num{font-family:var(--font-mono);font-size:13px;min-width:16px;text-align:center;}
.cart-empty{color:var(--text-faint);text-align:center;padding:40px 10px;font-size:13px;}
.cart-foot{padding:16px 18px;border-top:1px solid var(--border-soft);}
.cart-total-line{display:flex;justify-content:space-between;font-family:var(--font-mono);font-size:14px;margin-bottom:4px;color:var(--accent-gold);font-weight:600;}

/* receipt / summary */
.receipt{
  background:var(--bg-panel);border:1px solid var(--border-soft);border-radius:var(--radius);
  padding:22px;max-width:460px;margin:0 auto;position:relative;
  background-image:radial-gradient(circle at 0 0, transparent 9px, var(--bg-panel) 9.5px), radial-gradient(circle at 100% 0, transparent 9px, var(--bg-panel) 9.5px);
}
.receipt-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px dashed var(--border-soft);font-family:var(--font-mono);font-size:13px;}
.receipt-row:last-child{border-bottom:none;}
.receipt-total{display:flex;justify-content:space-between;padding-top:14px;margin-top:6px;border-top:2px solid var(--border-strong);font-family:var(--font-mono);font-weight:700;color:var(--accent-gold);font-size:16px;}
.dotted-divider{border:none;border-top:1px dashed var(--border-soft);margin:16px 0;}

/* payment */
.pay-grid{display:grid;grid-template-columns:1fr 1fr;gap:22px;max-width:760px;margin:0 auto;}
.qr-box{
  aspect-ratio:1;background:repeating-linear-gradient(45deg,var(--bg-elevated),var(--bg-elevated) 10px,var(--bg-elevated-2) 10px,var(--bg-elevated-2) 20px);
  border:1.5px dashed var(--border-strong);border-radius:var(--radius);display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:8px;color:var(--text-faint);font-size:12.5px;text-align:center;padding:20px;overflow:hidden;
}
.qr-box img{width:100%;height:100%;object-fit:contain;background:#fff;border-radius:8px;}
.bank-line{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border-soft);font-size:13px;}
.bank-line:last-child{border-bottom:none;}
.bank-label{color:var(--text-faint);}
.bank-val{font-family:var(--font-mono);color:var(--text-primary);}

/* forms */
.form-row{margin-bottom:14px;}
.form-row label{display:block;font-size:12px;color:var(--text-muted);margin-bottom:6px;font-weight:600;letter-spacing:.02em;}
.input,select.input{
  width:100%;background:var(--bg-elevated);border:1px solid var(--border-soft);color:var(--text-primary);
  border-radius:var(--radius-sm);padding:10px 12px;font-size:13.5px;outline:none;transition:border-color .15s ease;
}
.input:focus{border-color:var(--accent-orange);}
.form-grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.file-btn{display:inline-flex;align-items:center;gap:7px;background:var(--bg-elevated);border:1px solid var(--border-soft);border-radius:999px;padding:8px 14px;font-size:12px;color:var(--text-muted);}
.file-btn:hover{color:var(--accent-gold);border-color:var(--accent-gold);}

/* history table */
.table-wrap{overflow-x:auto;border:1px solid var(--border-soft);border-radius:var(--radius);}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;padding:12px 14px;background:var(--bg-elevated);color:var(--accent-gold);font-size:11.5px;text-transform:uppercase;letter-spacing:.06em;white-space:nowrap;}
td{padding:12px 14px;border-top:1px solid var(--border-soft);vertical-align:top;}
tr:hover td{background:rgba(255,122,41,0.04);}

/* admin */
.pin-wrap{max-width:320px;margin:60px auto;text-align:center;}
.pin-dots{display:flex;justify-content:center;gap:10px;margin:22px 0;}
.pin-dot{width:14px;height:14px;border-radius:50%;border:1.5px solid var(--border-strong);}
.pin-dot.filled{background:var(--accent-orange);border-color:var(--accent-orange);}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:240px;margin:0 auto;}
.pin-key{background:var(--bg-elevated);border:1px solid var(--border-soft);color:var(--text-primary);border-radius:var(--radius-sm);padding:16px 0;font-size:17px;font-weight:600;}
.pin-key:hover{border-color:var(--accent-gold);color:var(--accent-gold);}
.settings-tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
.settings-tab{background:var(--bg-elevated);border:1px solid var(--border-soft);color:var(--text-muted);padding:8px 14px;border-radius:999px;font-size:12.5px;font-weight:600;}
.settings-tab.active{background:var(--accent-orange);border-color:var(--accent-orange);color:#20120a;}
.prod-row{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--border-soft);flex-wrap:wrap;}
.prod-row:last-child{border-bottom:none;}
.prod-thumb{width:38px;height:38px;border-radius:50%;background:var(--bg-elevated);display:flex;align-items:center;justify-content:center;font-size:19px;overflow:hidden;flex:0 0 auto;}
.prod-thumb img{width:100%;height:100%;object-fit:cover;}
.prod-name-input{width:140px;}
.prod-price-input{width:90px;}
.currency-select{width:96px;}
.tiny{font-size:11px;color:var(--text-faint);}

/* toast */
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--bg-elevated-2);border:1px solid var(--accent-gold);color:var(--text-primary);padding:11px 20px;border-radius:999px;font-size:13px;z-index:99;box-shadow:0 8px 24px rgba(0,0,0,0.4);animation:toastIn .25s ease;}
@keyframes toastIn{from{opacity:0;transform:translate(-50%,10px);}to{opacity:1;transform:translate(-50%,0);}}

.empty-state{text-align:center;padding:50px 20px;color:var(--text-faint);}
.empty-state .big{font-size:38px;margin-bottom:10px;}

.flex-between{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;}
.mb-lg{margin-bottom:22px;}

@media (max-width:860px){
  .stat-grid{grid-template-columns:repeat(2,1fr);}
  .pay-grid{grid-template-columns:1fr;}
  .form-grid2{grid-template-columns:1fr;}
}
@media (max-width:520px){
  .brand-slogan{display:none;}
  .cart-fab span.label{display:none;}
  .stat-value{font-size:19px;}
  .product-grid{grid-template-columns:repeat(auto-fill,minmax(126px,1fr));}
}
</style>
</head>
<body>
<div id="app"><div class="loader">Warming the kettle…</div></div>

<script>
/* ============== DATA ============== */
const CURRENCIES = [
  {code:'INR',symbol:'₹',flag:'🇮🇳',name:'Indian Rupee'},
  {code:'USD',symbol:'$',flag:'🇺🇸',name:'US Dollar'},
  {code:'EUR',symbol:'€',flag:'🇪🇺',name:'Euro'},
  {code:'GBP',symbol:'£',flag:'🇬🇧',name:'British Pound'},
  {code:'AED',symbol:'د.إ',flag:'🇦🇪',name:'UAE Dirham'},
  {code:'SGD',symbol:'S$',flag:'🇸🇬',name:'Singapore Dollar'},
  {code:'AUD',symbol:'A$',flag:'🇦🇺',name:'Australian Dollar'},
  {code:'CAD',symbol:'C$',flag:'🇨🇦',name:'Canadian Dollar'},
];
function currencyOf(code){ return CURRENCIES.find(c=>c.code===code) || CURRENCIES[0]; }

const DEFAULT_PRODUCTS = [
  {id:'tea',name:'Tea',category:'Beverages',price:10,currency:'INR',emoji:'🍵',photo:null},
  {id:'coffee',name:'Coffee',category:'Beverages',price:15,currency:'INR',emoji:'☕',photo:null},
  {id:'horlicks',name:'Horlicks',category:'Beverages',price:20,currency:'INR',emoji:'🥛',photo:null},
  {id:'boost',name:'Boost',category:'Beverages',price:20,currency:'INR',emoji:'🥤',photo:null},
  {id:'puffs',name:'Puffs',category:'Snacks',price:15,currency:'INR',emoji:'🥟',photo:null},
  {id:'sandwich',name:'Sandwiches',category:'Snacks',price:30,currency:'INR',emoji:'🥪',photo:null},
  {id:'murukku',name:'Murukku',category:'Snacks',price:10,currency:'INR',emoji:'🌀',photo:null},
  {id:'parotta',name:'Parotta',category:'Parotta Varieties',price:15,currency:'INR',emoji:'🫓',photo:null},
  {id:'idli',name:'Idli',category:'Tiffin',price:20,currency:'INR',emoji:'⚪',photo:null},
  {id:'dosa',name:'Dosa',category:'Tiffin',price:25,currency:'INR',emoji:'🫓',photo:null},
  {id:'plainroast',name:'Plain Roast',category:'Tiffin',price:30,currency:'INR',emoji:'🥞',photo:null},
  {id:'idiyappam',name:'Idiyappam',category:'Tiffin',price:25,currency:'INR',emoji:'🍜',photo:null},
  {id:'appam',name:'Appam',category:'Tiffin',price:25,currency:'INR',emoji:'🥞',photo:null},
  {id:'kesari',name:'Kesari',category:'Sweets',price:20,currency:'INR',emoji:'🍮',photo:null},
  {id:'rava',name:'Rava',category:'Tiffin',price:25,currency:'INR',emoji:'🍲',photo:null},
  {id:'muttakalakki',name:'Mutta Kalakki',category:'Rice & Curry',price:40,currency:'INR',emoji:'🍳',photo:null},
  {id:'kulambukalakki',name:'Kulambu Kalakki',category:'Rice & Curry',price:50,currency:'INR',emoji:'🍛',photo:null},
  {id:'kothuparotta',name:'Kothu Parotta',category:'Parotta Varieties',price:60,currency:'INR',emoji:'🍛',photo:null},
  {id:'veechparotta',name:'Veech Parotta',category:'Parotta Varieties',price:40,currency:'INR',emoji:'🫓',photo:null},
  {id:'bunparotta',name:'Bun Parotta',category:'Parotta Varieties',price:20,currency:'INR',emoji:'🥐',photo:null},
];
const DEFAULT_SETTINGS = {
  shopName:"Murugan's Tea Stall",
  slogan:"Fresh brew, warm hearts — every cup, every time.",
  logo:null,
  pin:'1234',
  qr:null,
  bank:{accountName:'',accountNumber:'',bankName:'',ifsc:'',swift:'',upiId:''},
};

/* ============== STATE ============== */
const state = {
  settings: null,
  products: null,
  sales: null,
  cart: [],
  view: 'dashboard',
  cartOpen: false,
  adminUnlocked: false,
  pinEntry: '',
  pinMode: 'unlock', // unlock | setnew
  settingsTab: 'branding',
  editingNewProduct: false,
};

/* ============== STORAGE ============== */
async function loadKey(key, fallback){
  try{
    const res = await window.storage.get(key, false);
    return res && res.value ? JSON.parse(res.value) : fallback;
  }catch(e){ return fallback; }
}
async function saveKey(key, val){
  try{ await window.storage.set(key, JSON.stringify(val), false); }
  catch(e){ console.error('storage save failed', key, e); }
}
function fileToBase64(file){
  return new Promise((resolve,reject)=>{
    const r = new FileReader();
    r.onload = ()=>resolve(r.result);
    r.onerror = reject;
    r.readAsDataURL(file);
  });
}

/* ============== HELPERS ============== */
function money(amount, code){
  const c = currencyOf(code);
  return c.symbol + Number(amount).toFixed(2);
}
function todayStr(){ return new Date().toDateString(); }
function isThisMonth(d){
  const now = new Date();
  const dt = new Date(d);
  return dt.getFullYear()===now.getFullYear() && dt.getMonth()===now.getMonth();
}
function fmtDate(iso){
  const d = new Date(iso);
  return d.toLocaleDateString(undefined,{day:'2-digit',month:'short',year:'numeric'}) + ' · ' + d.toLocaleTimeString(undefined,{hour:'2-digit',minute:'2-digit'});
}
function groupTotalsByCurrency(items){
  const totals = {};
  items.forEach(it=>{
    totals[it.currency] = (totals[it.currency]||0) + it.price*it.qty;
  });
  return totals;
}
let toastTimer=null;
function toast(msg){
  let el = document.getElementById('toastEl');
  if(el) el.remove();
  el = document.createElement('div');
  el.id='toastEl'; el.className='toast'; el.textContent=msg;
  document.body.appendChild(el);
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.remove(), 2200);
}
function esc(str){
  return String(str).replace(/[&<>"']/g, s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));
}

/* ============== APP ============== */
const App = {
  async init(){
    const [settings, products, sales] = await Promise.all([
      loadKey('settings', DEFAULT_SETTINGS),
      loadKey('products', DEFAULT_PRODUCTS),
      loadKey('sales', []),
    ]);
    state.settings = Object.assign({}, DEFAULT_SETTINGS, settings, {bank: Object.assign({}, DEFAULT_SETTINGS.bank, settings && settings.bank)});
    state.products = products && products.length ? products : DEFAULT_PRODUCTS;
    state.sales = sales || [];
    render();
  },

  go(view){
    state.view = view;
    state.cartOpen = false;
    render();
    window.scrollTo({top:0,behavior:'smooth'});
  },

  toggleCart(force){
    state.cartOpen = typeof force==='boolean' ? force : !state.cartOpen;
    render();
  },

  addToCart(productId){
    const p = state.products.find(x=>x.id===productId);
    if(!p) return;
    const existing = state.cart.find(c=>c.productId===productId && c.currency===p.currency);
    if(existing){ existing.qty += 1; }
    else{ state.cart.push({productId:p.id,name:p.name,price:p.price,currency:p.currency,emoji:p.emoji,photo:p.photo,qty:1}); }
    toast(p.name + ' added to cart');
    render();
  },
  changeQty(idx, delta){
    const item = state.cart[idx];
    if(!item) return;
    item.qty += delta;
    if(item.qty<=0) state.cart.splice(idx,1);
    render();
  },
  removeFromCart(idx){ state.cart.splice(idx,1); render(); },
  clearCart(){ state.cart = []; render(); },

  proceedToSummary(){
    if(state.cart.length===0){ toast('Your cart is empty'); return; }
    state.cartOpen = false;
    state.view = 'summary';
    render();
  },
  proceedToPayment(){
    state.view = 'payment';
    render();
  },
  backTo(view){ state.view = view; render(); },

  async confirmPayment(){
    const totals = groupTotalsByCurrency(state.cart);
    const sale = {
      id: 'S' + Date.now(),
      date: new Date().toISOString(),
      items: state.cart.map(c=>({name:c.name, qty:c.qty, price:c.price, currency:c.currency})),
      totals,
    };
    state.sales = [sale, ...state.sales];
    await saveKey('sales', state.sales);
    state.cart = [];
    state.view = 'success';
    render();
  },

  downloadCSV(){
    const rows = [['Date','Time','Items','Total']];
    state.sales.forEach(s=>{
      const d = new Date(s.date);
      const itemsStr = s.items.map(it=>`${it.name} x${it.qty}`).join('; ');
      const totalStr = Object.entries(s.totals).map(([cur,amt])=>money(amt,cur)).join(' + ');
      rows.push([d.toLocaleDateString(), d.toLocaleTimeString(), itemsStr, totalStr]);
    });
    const csv = rows.map(r=>r.map(cell=>`"${String(cell).replace(/"/g,'""')}"`).join(',')).join('\n');
    const blob = new Blob([csv], {type:'text/csv'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'murugans-tea-stall-sales.csv';
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
    toast('CSV downloaded');
  },

  async resetStats(){
    if(!confirm('This will permanently clear all sales history and dashboard statistics. Continue?')) return;
    state.sales = [];
    await saveKey('sales', []);
    toast('Statistics reset');
    render();
  },

  /* ---- PIN / admin ---- */
  pinPress(d){
    if(state.pinEntry.length>=4) return;
    state.pinEntry += d;
    if(state.pinEntry.length===4){
      setTimeout(()=>App.pinSubmit(), 120);
    }
    render();
  },
  pinBackspace(){ state.pinEntry = state.pinEntry.slice(0,-1); render(); },
  pinSubmit(){
    if(state.pinEntry === state.settings.pin){
      state.adminUnlocked = true;
      state.pinEntry = '';
      render();
    } else {
      toast('Incorrect PIN');
      state.pinEntry = '';
      render();
    }
  },
  lockAdmin(){ state.adminUnlocked = false; state.pinEntry=''; render(); },
  setSettingsTab(tab){ state.settingsTab = tab; render(); },

  async saveBranding(){
    const name = document.getElementById('inpShopName').value.trim();
    const slogan = document.getElementById('inpSlogan').value.trim();
    state.settings.shopName = name || DEFAULT_SETTINGS.shopName;
    state.settings.slogan = slogan;
    await saveKey('settings', state.settings);
    toast('Branding updated');
    render();
  },
  async uploadLogo(e){
    const file = e.target.files[0]; if(!file) return;
    state.settings.logo = await fileToBase64(file);
    await saveKey('settings', state.settings);
    toast('Logo updated');
    render();
  },
  async uploadQR(e){
    const file = e.target.files[0]; if(!file) return;
    state.settings.qr = await fileToBase64(file);
    await saveKey('settings', state.settings);
    toast('QR code updated');
    render();
  },
  async saveBank(){
    state.settings.bank = {
      accountName: document.getElementById('bankAccName').value.trim(),
      accountNumber: document.getElementById('bankAccNum').value.trim(),
      bankName: document.getElementById('bankName').value.trim(),
      ifsc: document.getElementById('bankIfsc').value.trim(),
      swift: document.getElementById('bankSwift').value.trim(),
      upiId: document.getElementById('bankUpi').value.trim(),
    };
    await saveKey('settings', state.settings);
    toast('Payment details saved');
    render();
  },
  async savePin(){
    const p1 = document.getElementById('newPin').value.trim();
    const p2 = document.getElementById('confirmPin').value.trim();
    if(!/^\d{4,6}$/.test(p1)){ toast('PIN must be 4–6 digits'); return; }
    if(p1!==p2){ toast('PINs do not match'); return; }
    state.settings.pin = p1;
    await saveKey('settings', state.settings);
    toast('PIN updated');
    render();
  },

  async updateProductPrice(id, val){
    const p = state.products.find(x=>x.id===id); if(!p) return;
    const num = parseFloat(val);
    p.price = isNaN(num) ? 0 : num;
    await saveKey('products', state.products);
  },
  async updateProductName(id, val){
    const p = state.products.find(x=>x.id===id); if(!p) return;
    p.name = val || p.name;
    await saveKey('products', state.products);
    render();
  },
  async updateProductCurrency(id, val){
    const p = state.products.find(x=>x.id===id); if(!p) return;
    p.currency = val;
    await saveKey('products', state.products);
    render();
  },
  async uploadProductPhoto(id, e){
    const file = e.target.files[0]; if(!file) return;
    const p = state.products.find(x=>x.id===id); if(!p) return;
    p.photo = await fileToBase64(file);
    await saveKey('products', state.products);
    render();
  },
  async deleteProduct(id){
    if(!confirm('Remove this product from the catalog?')) return;
    state.products = state.products.filter(x=>x.id!==id);
    await saveKey('products', state.products);
    toast('Product removed');
    render();
  },
  toggleNewProductForm(){ state.editingNewProduct = !state.editingNewProduct; render(); },
  async addNewProduct(){
    const name = document.getElementById('npName').value.trim();
    const cat = document.getElementById('npCategory').value.trim() || 'Other';
    const price = parseFloat(document.getElementById('npPrice').value) || 0;
    const currency = document.getElementById('npCurrency').value;
    const emoji = document.getElementById('npEmoji').value.trim() || '🍽️';
    if(!name){ toast('Enter a product name'); return; }
    const id = name.toLowerCase().replace(/[^a-z0-9]+/g,'-') + '-' + Date.now().toString(36);
    state.products.push({id,name,category:cat,price,currency,emoji,photo:null});
    await saveKey('products', state.products);
    state.editingNewProduct = false;
    toast(name + ' added to catalog');
    render();
  },
};
window.App = App;

function renderTabs(){
  const tabs = [
    {id:'dashboard', label:'Dashboard', icon:'📊'},
    {id:'shop', label:'Shop', icon:'🍵'},
    {id:'history', label:'Sales History', icon:'🧾'},
    {id:'settings', label:'Settings', icon:'⚙️'},
  ];
  return `<div class="tabbar">
    ${tabs.map(t=>`<button class="tabbtn ${state.view===t.id || (state.view==='summary'&&t.id==='shop') || (state.view==='payment'&&t.id==='shop') || (state.view==='success'&&t.id==='shop') ? 'active':''}" onclick="App.go('${t.id}')">${t.icon} ${t.label}</button>`).join('')}
  </div>`;
}

function renderView(){
  switch(state.view){
    case 'dashboard': return renderDashboard();
    case 'shop': return renderShop();
    case 'summary': return renderSummary();
    case 'payment': return renderPayment();
    case 'success': return renderSuccess();
    case 'history': return renderHistory();
    case 'settings': return renderSettings();
    default: return renderDashboard();
  }
}

function renderDashboard(){
  const today = state.sales.filter(s=>new Date(s.date).toDateString()===todayStr());

  const todayTotals = {}; today.forEach(s=>Object.entries(s.totals).forEach(([c,a])=>todayTotals[c]=(todayTotals[c]||0)+a));
  const monthTotals = {}; month.forEach(s=>Object.entries(s.totals).forEach(([c,a])=>monthTotals[c]=(monthTotals[c]||0)+a));
  const fmtTotals = (t)=> Object.keys(t).length ? Object.entries(t).map(([c,a])=>money(a,c)).join(' + ') : money(0,'INR');

  return `
  <h2 class="section-title">Today's brew, at a glance</h2>

    <div class="card stat-card"><div class="stat-label">Today's Sales</div><div class="stat-value">${fmtTotals(todayTotals)}</div><div class="stat-sub">${today.length} order${today.length!==1?'s':''}</div></div>

      <h3 style="margin:0;font-family:var(--font-display);font-weight:400;font-size:18px;">Recent orders</h3>
      <button class="btn btn-ghost btn-sm" onclick="App.go('history')">View all</button>
    </div>
    ${state.sales.length===0 ? `<div class="empty-state"><div class="big">🍃</div>No sales yet today — first cup's on the way.</div>` :
      state.sales.slice(0,6).map(s=>`
        <div class="recent-row">
          <div>
            <div>${s.items.map(i=>`${esc(i.name)} ×${i.qty}`).join(', ')}</div>
            <div class="recent-meta">${fmtDate(s.date)}</div>
          </div>

    }

  if(!state.adminUnlocked){

    const keys = ['1','2','3','4','5','6','7','8','9','','0','⌫'];
    return `

          return `<button class="pin-key" onclick="App.pinPress('${k}')">${k}</button>`;
        }).join('')}
      </div>
      <p class="tiny" style="margin-top:18px;">Default PIN is 1234 unless changed.</p>
    </div>`;
  }

  const tabs = [
    {id:'branding', label:'Branding'},
    {id:'products', label:'Products'},
    {id:'payment', label:'Payment'},
    {id:'security', label:'Security'},
  ];

  return `
  <div class="flex-between mb-lg">
    <h2 class="section-title" style="margin:0;">Admin settings</h2>
    <button class="btn btn-ghost btn-sm" onclick="App.lockAdmin()">🔒 Lock</button>
  </div>
  <div class="settings-tabs">
    ${tabs.map(t=>`<button class="settings-tab ${state.settingsTab===t.id?'active':''}" onclick="App.setSettingsTab('${t.id}')">${t.label}</button>`).join('')}
  </div>
  ${state.settingsTab==='branding' ? renderBrandingTab() : ''}
  ${state.settingsTab==='products' ? renderProductsTab() : ''}
  ${state.settingsTab==='payment' ? renderPaymentTab() : ''}
  ${state.settingsTab==='security' ? renderSecurityTab() : ''}
  `;
}

function renderBrandingTab(){
  const s = state.settings;
  return `
  <div class="card" style="max-width:520px;">
    <div class="form-row">
      <label>Shop name</label>
      <input class="input" id="inpShopName" value="${esc(s.shopName)}">
    </div>
    <div class="form-row">
      <label>Slogan</label>
      <input class="input" id="inpSlogan" value="${esc(s.slogan||'')}">
    </div>
    <div class="form-row">
      <label>Header logo</label>
      <div style="display:flex;align-items:center;gap:12px;">
        <div class="product-photo" style="width:44px;height:44px;">${s.logo?`<img src="${s.logo}">`:'🍵'}</div>
        <label class="file-btn">📤 Upload logo<input type="file" accept="image/*" style="display:none" onchange="App.uploadLogo(event)"></label>
      </div>
    </div>
    <button class="btn btn-primary" onclick="App.saveBranding()">Save branding</button>
  </div>
  `;
}

function renderProductsTab(){
  return `
  <div class="card mb-lg">
    <div class="flex-between mb-lg">
      <h3 style="margin:0;font-family:var(--font-display);font-weight:400;font-size:18px;">Product catalog</h3>
      <button class="btn btn-ghost btn-sm" onclick="App.toggleNewProductForm()">${state.editingNewProduct?'Cancel':'+ Add product'}</button>
    </div>
    ${state.editingNewProduct ? `
    <div class="card" style="background:var(--bg-elevated);margin-bottom:16px;">
      <div class="form-grid2">
        <div class="form-row"><label>Name</label><input class="input" id="npName" placeholder="e.g. Filter Coffee"></div>
        <div class="form-row"><label>Category</label><input class="input" id="npCategory" placeholder="e.g. Beverages"></div>
        <div class="form-row"><label>Price</label><input class="input" id="npPrice" type="number" step="0.01" placeholder="0.00"></div>
        <div class="form-row"><label>Currency</label>
          <select class="input currency-select" id="npCurrency">
            ${CURRENCIES.map(c=>`<option value="${c.code}">${c.flag} ${c.code}</option>`).join('')}
          </select>
        </div>
        <div class="form-row"><label>Icon (emoji)</label><input class="input" id="npEmoji" placeholder="🍽️"></div>
      </div>
      <button class="btn btn-primary" onclick="App.addNewProduct()">Add to catalog</button>
    </div>` : ''}
    ${state.products.map(p=>`
      <div class="prod-row">
        <div class="prod-thumb">${p.photo?`<img src="${p.photo}">`:p.emoji}</div>
        <input class="input prod-name-input" value="${esc(p.name)}" onchange="App.updateProductName('${p.id}', this.value)">
        <select class="input currency-select" onchange="App.updateProductCurrency('${p.id}', this.value)">
          ${CURRENCIES.map(c=>`<option value="${c.code}" ${p.currency===c.code?'selected':''}>${c.flag} ${c.code}</option>`).join('')}
        </select>
        <input class="input prod-price-input" type="number" step="0.01" value="${p.price}" onchange="App.updateProductPrice('${p.id}', this.value)">
        <label class="file-btn">📤 Photo<input type="file" accept="image/*" style="display:none" onchange="App.uploadProductPhoto('${p.id}', event)"></label>
        <span class="tiny">${esc(p.category)}</span>
        <button class="btn btn-danger btn-sm" onclick="App.deleteProduct('${p.id}')">Delete</button>
      </div>
    `).join('')}
  </div>
  `;
}

function renderPaymentTab(){
  const b = state.settings.bank;
  return `
  <div class="card mb-lg" style="max-width:520px;">
    <h3 style="margin:0 0 12px;font-family:var(--font-display);font-weight:400;font-size:18px;">QR code</h3>
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:8px;">
      <div class="qr-box" style="width:90px;height:90px;padding:6px;">${b?'':''}${state.settings.qr?`<img src="${state.settings.qr}">`:'📷'}</div>
      <label class="file-btn">📤 Upload QR image<input type="file" accept="image/*" style="display:none" onchange="App.uploadQR(event)"></label>
    </div>
  </div>
  <div class="card" style="max-width:520px;">
    <h3 style="margin:0 0 12px;font-family:var(--font-display);font-weight:400;font-size:18px;">Bank account details</h3>
    <div class="form-row"><label>Account holder name</label><input class="input" id="bankAccName" value="${esc(b.accountName)}"></div>
    <div class="form-row"><label>Account number</label><input class="input" id="bankAccNum" value="${esc(b.accountNumber)}"></div>
    <div class="form-row"><label>Bank name</label><input class="input" id="bankName" value="${esc(b.bankName)}"></div>
    <div class="form-grid2">
      <div class="form-row"><label>IFSC code</label><input class="input" id="bankIfsc" value="${esc(b.ifsc)}"></div>
      <div class="form-row"><label>SWIFT / BIC</label><input class="input" id="bankSwift" value="${esc(b.swift)}"></div>
    </div>
    <div class="form-row"><label>UPI ID</label><input class="input" id="bankUpi" value="${esc(b.upiId)}"></div>
    <button class="btn btn-primary" onclick="App.saveBank()">Save payment details</button>
  </div>
  `;
}

function renderSecurityTab(){
  return `
  <div class="card mb-lg" style="max-width:420px;">
    <h3 style="margin:0 0 12px;font-family:var(--font-display);font-weight:400;font-size:18px;">Change admin PIN</h3>
    <div class="form-row"><label>New PIN (4–6 digits)</label><input class="input" id="newPin" type="password" inputmode="numeric" maxlength="6"></div>
    <div class="form-row"><label>Confirm PIN</label><input class="input" id="confirmPin" type="password" inputmode="numeric" maxlength="6"></div>
    <button class="btn btn-primary" onclick="App.savePin()">Update PIN</button>
  </div>
  <div class="card" style="max-width:420px;border-color:rgba(232,96,74,0.35);">
    <h3 style="margin:0 0 8px;font-family:var(--font-display);font-weight:400;font-size:18px;color:var(--danger);">Reset statistics</h3>
    <p class="tiny" style="margin-bottom:14px;">Clears all sales history and dashboard numbers. Products and branding are kept. This cannot be undone.</p>
    <button class="btn btn-danger" onclick="App.resetStats()">Reset all statistics</button>
  </div>
  `;
}

/* ============== BOOT ============== */
App.init();
</script>
</body>
</html>
